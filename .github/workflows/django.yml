name: Django CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  ENVIRONMENT: CI
  SENDGRID_PASSWORD: x
  SENDGRID_USERNAME: x
  SECRET_KEY: 1234
  ADMIN1: John, test@email.com
  ADMIN2: Paul, test2@email.com
  REDIS_URL: redis://localhost:6379/0

jobs:

  build:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.12"
    - name: Install Dependencies
      run: uv sync
    - name: Run Tests
      run: |
        uv run python manage.py test --settings=project.settings.test --parallel
        uv run pytest tests/ -v --disable-warnings

name: Django CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  ENVIRONMENT: CI
  SENDGRID_PASSWORD: x
  SENDGRID_USERNAME: x
  SECRET_KEY: 1234
  ADMIN1: John, test@email.com
  ADMIN2: Paul, test2@email.com
  REDIS_URL: redis://localhost:6379/0

jobs:

  build:

    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.9, '3.10']

    services:
      # Label used to access the service container
      postgres:
        # Docker Hub image
        image: postgres
        # Provide the password for postgres
        env:
          POSTGRES_PASSWORD: postgres
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432

      redis:
        # Docker Hub image
        image: redis
        # Set health checks to wait until redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        # django-allauth 0.47.0 setup.py does __import__("allauth") at build
        # time, which fails in pip's isolated build env. Pre-build it by
        # setting PYTHONPATH to the extracted source so the import resolves.
        tmpdir=$(mktemp -d)
        python -m pip download --no-deps django-allauth==0.47.0 -d $tmpdir -q
        tar xzf $tmpdir/django-allauth-0.47.0.tar.gz -C $tmpdir
        PYTHONPATH=$tmpdir/django-allauth-0.47.0 python -m pip install --no-build-isolation --no-deps $tmpdir/django-allauth-0.47.0
        python -m pip install -r requirements.txt
    - name: Run Tests
      run: |
        python manage.py test --settings=project.settings.test --parallel 
        pytest tests/ -v --disable-warnings
